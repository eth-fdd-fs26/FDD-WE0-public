<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 2: Attributes & Methods</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
       background:#ffffff;color:#1e293b;padding:22px;line-height:1.5}
  .card{max-width:760px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.08);border-radius:14px;padding:24px}
  h1{font-size:20px;margin:0 0 2px}
  .sub{color:#64748b;font-size:13px;margin:0 0 18px}
  .q{margin:18px 0;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0}
  .q p.stem{font-weight:600;margin:0 0 10px}
  code{background:#f1f5f9;border:1px solid #e2e8f0;padding:2px 6px;border-radius:6px;font-size:13px;color:#be123c}
  pre{background:#f1f5f9;color:#0f172a;padding:12px;border-radius:8px;overflow:auto;font-size:13px;border:1px solid #e2e8f0}
  label{display:block;padding:8px 10px;margin:6px 0;border-radius:8px;cursor:pointer;border:1px solid transparent}
  label:hover{background:#f1f5f9}
  input{margin-right:8px}
  .fb{margin-top:10px;font-size:13.5px;display:none;padding:8px 10px;border-radius:8px}
  .fb.ok{background:rgba(16,185,129,.15);color:#047857;display:block}
  .fb.no{background:rgba(239,68,68,.15);color:#b91c1c;display:block}
  label.correct{background:rgba(16,185,129,.18);border-color:#10b981}
  label.wrong{background:rgba(239,68,68,.15);border-color:#ef4444}
  button{margin-top:18px;background:#3b82f6;color:#fff;border:none;padding:11px 20px;border-radius:9px;
         font-size:15px;font-weight:600;cursor:pointer}
  button:hover{background:#2563eb}
  #score{margin-top:16px;font-size:16px;font-weight:700;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>Quiz 2: Attributes & Methods (object state)</h1>
  <p class="sub">Section 2 check. Pick one answer per question, then press <b>Check answers</b>.</p>
  <div id="quiz"></div>
  <button onclick="check()">Check answers</button>
  <div id="score"></div>
</div>
<script>
const QUESTIONS = [
  {stem:"What is the difference between an <b>attribute</b> and a <b>method</b>?",
   opts:["An attribute stores data (state); a method is a function that defines behavior",
         "An attribute is a function; a method stores data",
         "They are two words for the exact same thing",
         "Attributes belong to classes, methods belong to files"],
   correct:0,
   exp:"Attributes = what the object knows (its state). Methods = what the object can do."},
  {stem:"Inside a method, how do you change an object's hunger to 0?",
   opts:["<code>hunger = 0</code>","<code>self.hunger = 0</code>","<code>Animal.hunger = 0</code>","<code>this.hunger = 0</code>"],
   correct:1,
   exp:"Use <code>self.hunger = 0</code> so you modify <i>this specific object's</i> state."},
  {stem:"After calling <code>simba.eat()</code> which sets <code>self.hunger -= 3</code>, what happened?",
   opts:["The Animal class changed for everyone",
         "Only <code>simba</code>'s own hunger attribute changed",
         "Nothing, methods cannot change attributes",
         "A new object was created"],
   correct:1,
   exp:"The method changed the state of that one object. Other animals are unaffected."},
  {stem:"Why do methods almost always take <code>self</code> as the first parameter?",
   opts:["It is just a naming tradition with no effect",
         "So the method can access and modify the attributes of the object it was called on",
         "Because Python requires every function to start with self",
         "To make the code run faster"],
   correct:1,
   exp:"<code>self</code> gives the method access to that object's own attributes and other methods."},
  {stem:"<code>simba.sleep()</code> sets energy to 10 and hunger +=1. This is an example of...",
   opts:["Inheritance","Changing the object's state through a method","Creating a new class","Composition"],
   correct:1,
   exp:"A method updated several attributes, that's the object's <b>state</b> changing over time."},
];
const quiz=document.getElementById('quiz');
QUESTIONS.forEach((q,i)=>{
  const div=document.createElement('div');div.className='q';
  div.innerHTML=`<p class="stem">${i+1}. ${q.stem}</p>`+
    q.opts.map((o,j)=>`<label data-q="${i}" data-o="${j}"><input type="radio" name="q${i}" value="${j}">${o}</label>`).join('')+
    `<div class="fb" id="fb${i}"></div>`;
  quiz.appendChild(div);
});
function check(){
  let s=0;
  QUESTIONS.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const fb=document.getElementById('fb'+i);
    document.querySelectorAll(`label[data-q="${i}"]`).forEach(l=>l.classList.remove('correct','wrong'));
    document.querySelector(`label[data-q="${i}"][data-o="${q.correct}"]`).classList.add('correct');
    if(sel && +sel.value===q.correct){s++;fb.className='fb ok';fb.innerHTML='Correct. '+q.exp;}
    else{fb.className='fb no';fb.innerHTML=''+q.exp;
      if(sel)document.querySelector(`label[data-q="${i}"][data-o="${sel.value}"]`).classList.add('wrong');}
  });
  const sc=document.getElementById('score');sc.style.display='block';
  sc.textContent=`Score: ${s} / ${QUESTIONS.length}`;
  sc.style.color = s===QUESTIONS.length?'#047857':'#b45309';
}
</script>
</body>
</html>
